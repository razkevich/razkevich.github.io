name: deploy

# Builds the ValkeyCluster operator docs (canonical source lives in
# razkevich/valkeycluster-operator) and publishes them at https://razkevich.github.io/.
# Single source of truth: this repo holds no docs, it just builds + deploys the operator repo's docs/.

on:
  workflow_dispatch:        # "Run workflow" for an immediate refresh
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"   # mirror the operator repo's docs a few times a day

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the operator repo (docs source of truth)
        uses: actions/checkout@v4
        with:
          repository: razkevich/valkeycluster-operator
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "mkdocs-material>=9.5,<10"
      - name: Point site_url at the root domain
        run: sed -i 's#^site_url:.*#site_url: https://razkevich.github.io/#' mkdocs.yml
      - run: mkdocs build --strict
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
